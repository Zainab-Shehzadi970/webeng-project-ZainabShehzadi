<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - SMS</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="/assets/css/style.css">
<script src="/assets/js/api.js"></script>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }

.glow {
  box-shadow: 0 0 20px rgba(72,201,176,0.5);
}

</style>
</head>

<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center p-6">

<div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden" data-aos="zoom-in">

<!-- HEADER -->
<div class="bg-gradient-to-r from-slate-800 to-slate-700 p-8 text-white text-center">
  <div class="flex justify-center items-center gap-2 text-2xl font-bold mb-2">
    <i class="fas fa-book-open text-emerald-400 animate-pulse"></i>
    <span>SMS</span>
  </div>

  <h2 class="text-xl font-semibold">Create Account</h2>
  <p class="text-gray-300 text-sm mt-1">Start managing students smarter 🚀</p>
</div>

<!-- FORM -->
<div class="p-8">

<form id="registerForm">

  <!-- NAME -->
  <div class="mb-4">
    <label class="text-sm font-bold text-gray-700">Full Name</label>
    <div class="relative mt-1">
      <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
      <input id="name"
        class="w-full pl-10 py-3 border rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none"
        type="text" placeholder="John Doe" required>
    </div>
  </div>

  <!-- EMAIL -->
  <div class="mb-4">
    <label class="text-sm font-bold text-gray-700">Email</label>
    <div class="relative mt-1">
      <i class="fas fa-envelope absolute left-3 top-3 text-gray-400"></i>
      <input id="email"
        class="w-full pl-10 py-3 border rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none"
        type="email" placeholder="name@email.com" required>
    </div>
  </div>

  <!-- PASSWORD -->
  <div class="mb-4">
    <label class="text-sm font-bold text-gray-700">Password</label>
    <div class="relative mt-1">
      <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
      <input id="password"
        class="w-full pl-10 pr-10 py-3 border rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none"
        type="password" required>

      <i onclick="togglePassword('password', this)"
         class="fas fa-eye absolute right-3 top-3 cursor-pointer text-gray-400"></i>
    </div>
  </div>

  <!-- CONFIRM -->
  <div class="mb-6">
    <label class="text-sm font-bold text-gray-700">Confirm Password</label>
    <div class="relative mt-1">
      <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
      <input id="confirmPassword"
        class="w-full pl-10 pr-10 py-3 border rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none"
        type="password" required>

      <i onclick="togglePassword('confirmPassword', this)"
         class="fas fa-eye absolute right-3 top-3 cursor-pointer text-gray-400"></i>
    </div>
  </div>

  <!-- BUTTON -->
  <button id="registerBtn"
    class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-lg font-bold glow transition">
    Create Account
  </button>

</form>

<p class="text-center text-sm text-gray-600 mt-6">
  Already have an account?
  <a href="login.html" class="text-emerald-500 font-bold hover:underline">
    Login
  </a>
</p>

</div>

<!-- FOOTER -->
<div class="text-center py-4 text-xs text-gray-400">
  © 2026 SMS
</div>

</div>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({ duration: 1000 });

function togglePassword(id, icon) {
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
  icon.classList.toggle("fa-eye-slash");
}

// REGISTER LOGIC
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn = document.getElementById('registerBtn');

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    return alert("Passwords do not match ❌");
  }

  try {
    btn.innerText = "Creating...";
    btn.disabled = true;

    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, confirmPassword})
    });

    const data = await res.json();

    if (!data.success) throw new Error(data.message);

    alert("Account Created ✅");

    window.location.href = "login.html";

  } catch (err) {
    alert(err.message);
  } finally {
    btn.innerText = "Create Account";
    btn.disabled = false;
  }
});
</script>

</body>
</html>
