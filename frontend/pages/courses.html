<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses - SMS</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="/utils/helpers.js"></script>
<script src="/assets/js/courses.js" defer></script>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>

<body class="bg-gray-100">

<script>
if (!localStorage.getItem('token')) {
  window.location.href = "/login";
}
</script>

<div id="sidebar"></div>

<div class="ml-64 min-h-screen flex flex-col">
  <div id="navbar"></div>

  <main class="p-6 md:p-8 flex-1">

    <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
      <div class="flex gap-3 w-full md:w-auto items-center">
        <div class="relative">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400 text-sm"></i>
          <input id="searchInput" type="text" placeholder="Search courses..."
            class="pl-9 pr-4 py-2 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none w-64">
        </div>
        <button onclick="openAddModal()"
          class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-xl shadow font-semibold flex items-center gap-2">
          <i class="fa-solid fa-plus"></i> Add New Course
        </button>
      </div>
    </div>

    <div id="coursesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  </main>

  <div id="footer"></div>
</div>

<div id="loader"></div>

<!-- MODAL -->
<div id="courseModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
  <div class="bg-white p-6 rounded-2xl w-full max-w-md shadow-xl">
    <h2 id="modalTitle" class="text-xl font-bold mb-4">Add Course</h2>
    <input id="courseName" placeholder="Course Name"
      class="w-full mb-3 p-3 border rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none">
    <input id="courseCode" placeholder="Course Code"
      class="w-full mb-4 p-3 border rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none">
    <div class="flex justify-end gap-3">
      <button onclick="closeModal()" class="px-4 py-2 bg-gray-400 hover:bg-gray-500 text-white rounded-lg">Cancel</button>
      <button onclick="saveCourse()" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg">Save</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  loadComponent("sidebar", "/components/sidebar.html");
  loadComponent("navbar", "/components/navbar.html");
  loadComponent("footer", "/components/footer.html");
  loadComponent("loader", "/components/loader.html");
});
</script>

<script>
function logout() {
  localStorage.clear();
  window.location.href = "/login";
}
</script>

</body>
</html>
